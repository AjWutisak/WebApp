</head>
<body class="pb-20 text-slate-800">

    <div class="max-w-7xl mx-auto px-3 md:px-6 -mt-6 relative z-20">

                        <h3 class="font-bold text-blue-800 text-sm md:text-base flex items-center gap-1.5"><i class="ph ph-funnel text-lg"></i> กรองพื้นที่ที่ต้องการ <span id="geoStatus" class="text-blue-500 font-normal text-xs ml-1"></span></h3>
                        <p id="filterSummaryText" class="text-xs text-blue-600 mt-1">ยังไม่ได้เลือกพื้นที่ (แสดงทั้งหมด)</p>

                <!-- Config -->

                        <label class="block text-[10px] md:text-xs font-semibold text-slate-500 mb-1.5 truncate">ไปวันละ (หลัง)</label>
                        <input type="number" id="perDayLimit" value="5" min="1" class="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-pink-500 text-sm md:text-base font-bold text-center bg-slate-50">
                    </div>
                    <div class="w-[66%] md:flex-1">

                        <div class="flex gap-1 md:gap-2">
                            <input type="text" id="startCoords" value="13.1126, 99.9392" class="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none text-xs md:text-sm font-mono text-slate-600 bg-slate-50 hidden md:block">
                            <button onclick="useSchoolCoords()" class="flex-1 md:px-5 bg-slate-100 text-slate-700 py-2.5 rounded-lg text-xs md:text-sm font-semibold border border-slate-200 shadow-sm active:bg-slate-200">🏫 รร.</button>
                            <button onclick="useCurrentCoords()" class="flex-1 md:px-5 bg-rose-50 text-rose-600 py-2.5 rounded-lg text-xs md:text-sm font-semibold border border-rose-200 shadow-sm active:bg-rose-100">📍 ปัจจุบัน</button>

                <button onclick="generatePlan()" class="w-full bg-gradient-to-r from-pink-600 to-rose-500 text-white font-bold py-3.5 rounded-xl shadow-md flex items-center justify-center gap-2 text-base mt-2">

        <div class="relative mb-6">

        <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-4 md:p-6 mb-8">

    <!-- Modals (ตัวกรอง และ แจ้งเตือน) -->

        <div class="bg-white w-full md:max-w-md md:rounded-2xl md:mx-auto rounded-t-2xl shadow-2xl flex flex-col max-h-[85vh] transform translate-y-full md:translate-y-0 md:scale-95 transition-all duration-300" id="filterModalContent">

            <div class="p-4 border-b flex justify-between items-center bg-blue-50 rounded-t-2xl">

    <!-- Modal แสดงรูปภาพ (เด้งขึ้นมากลางจอ) -->

            <button class="absolute -top-12 right-0 text-white hover:text-gray-300 text-4xl font-bold drop-shadow-md" onclick="closeImageModal()">&times;</button>
            
            <img id="modalImageObj" src="" class="max-h-[80vh] w-auto object-contain rounded-xl shadow-2xl bg-white" 
                 onerror="this.onerror=null; this.src='https://placehold.co/600x400?text=ไม่สามารถดึงรูปมาแสดงได้'; document.getElementById('modalImageLink').classList.remove('hidden');">
            
            <p id="modalImageTitle" class="text-white mt-4 text-lg md:text-xl font-bold text-center drop-shadow-md"></p>
            
            <!-- ลิงก์ปุ่มสำรองให้กดเปิดรูปในแท็บใหม่ -->
            <a id="modalImageLink" href="#" target="_blank" class="hidden mt-3 bg-blue-600 text-white px-5 py-2.5 rounded-lg font-bold shadow-md hover:bg-blue-700 transition flex items-center gap-2">
                <i class="ph ph-arrow-square-out text-lg"></i> คลิกเปิดรูปภาพในหน้าต่างใหม่
            </a>
        </div>

    <!-- แจ้งเตือน Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-800/90 backdrop-blur-sm text-white px-5 py-3 rounded-full shadow-lg text-sm font-medium transition-opacity duration-300 opacity-0 pointer-events-none z-[250] flex items-center gap-2">
        <span id="toastMsg">...</span>
    </div>

    <script>
        // =========================================================
        // ❗❗ วาง URL Web App ของคุณครูที่นี่ ❗❗
        const API_URL = "https://script.google.com/macros/s/AKfycbxKk-c6eQKyxM25xjgEXIonoNyKiBsDPdhccKqOY3gLeOb1Y8NfhigIgYZs_UOIprYS/exec";
        // =========================================================

        let map, mapLayerGroup;
        let allStudents = [];
        let addressCache = {};
        let currentPlan = [];
        let selectedDistricts = [], selectedSubdistricts = [];

        // ชุดสีสำหรับแสดงวันต่างๆ (เอาสีเขียวออก สงวนไว้ให้เยี่ยมแล้ว)
        const dayColors = [
            { bg: 'bg-blue-500', hex: '#3b82f6' }, { bg: 'bg-pink-500', hex: '#ec4899' },
            { bg: 'bg-orange-500', hex: '#f97316' }, { bg: 'bg-purple-500', hex: '#a855f7' },
            { bg: 'bg-cyan-500', hex: '#06b6d4' }, { bg: 'bg-indigo-500', hex: '#6366f1' }
        ];

        // --- ระบบ Storage ---
        function loadStoredData() {
            try {
                // บน GitHub Pages, localStorage จะทำงานได้ดีเยี่ยม
                addressCache = JSON.parse(localStorage.getItem('addressCacheM52')) || {}; 
            } catch (error) {
                addressCache = {};
            }
        }

        function initMap() {
            map = L.map('map', { tap: false }).setView([13.1126, 99.9392], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            mapLayerGroup = L.layerGroup().addTo(map);
            setTimeout(() => { map.invalidateSize(); }, 500);
        }

        // ดึงข้อมูลผ่าน API โดยตรง
        function fetchDirectFromSheet() {
            if(API_URL === "วาง_URL_ที่นี่") {
                document.getElementById('loader').innerHTML = `<p class="text-rose-600 font-bold p-4 text-center">อ๊ะ! อาจารย์ลืมใส่ URL Web App ลงในบรรทัด API_URL ครับ</p>`;
                return;
            }

            const loaderText = document.getElementById('loaderText');
            loaderText.innerText = "กำลังเชื่อมต่อข้อมูล...";

            // สุ่มชื่อฟังก์ชัน JSONP Callback ทะลุ Cache
            const cbName = 'callback_' + Date.now() + Math.floor(Math.random() * 1000);
            
            const timeoutId = setTimeout(() => {
                document.getElementById('loader').innerHTML = `<p class="text-rose-600 font-bold p-4 text-center">การเชื่อมต่อหมดเวลา โปรดรีเฟรชหน้าจอ</p>`;
            }, 15000);

            window[cbName] = function(data) {
                clearTimeout(timeoutId);
                delete window[cbName];
                
                // ตรวจสอบข้อมูลอิงตามรูปแบบ Code.gs ตัวใหม่ของอาจารย์
                if (data && data.success) {
                    processData(data.data);
                } else {
                    document.getElementById('loader').innerHTML = `<p class="text-rose-600 font-bold p-4 text-center">เซิร์ฟเวอร์แจ้งเตือน: ${data.error || 'ข้อผิดพลาดจากเซิร์ฟเวอร์'}</p>`;
                }
            };

            const script = document.createElement('script');
            script.src = `${API_URL}?action=read&callback=${cbName}&t=${Date.now()}`;
            script.onerror = () => {
                clearTimeout(timeoutId);
                document.getElementById('loader').innerHTML = `<p class="text-rose-600 font-bold p-4 text-center">โดนบล็อกการดึงข้อมูล หรือ URL ผิด</p>`;
            };
            document.head.appendChild(script);
        }

        function processData(records) {
            allStudents = [];
            // วนลูปอ่านข้อมูล Object ที่ได้จาก Code.gs
            for (let i = 0; i < records.length; i++) {
                const rec = records[i];
                
                // นำข้อมูลจาก Object มาเก็บในตัวแปร โดยใช้ rec.xxx ตามที่กำหนดใน Code.gs
                const studentId = String(rec.rowIndex); // ใช้ rowIndex เป็น ID หลัก
                const stdNo = rec.id || '-';
                const fName = rec.name || ''; // fname + lname ถูกรวมมาแล้วใน Code.gs
                const phone = rec.phone || '-';
                const lat = parseFloat(rec.lat);
                const lng = parseFloat(rec.lng);
                const isVisited = rec.visited === true;
                
                const studentPic = rec.studentPic || ''; 
                const housePic = rec.housePic || ''; 

                let address = { province: '', district: '', subdistrict: '', full: 'ค้นหาพิกัด...' };
                const coordKey = `${lat},${lng}`;
                if(lat && lng && addressCache[coordKey]) address = addressCache[coordKey];

                if (lat && !isNaN(lat)) {
                    allStudents.push({ 
                        id: studentId, stdNo, fName, phone, lat, lng, 
                        isVisited, address, coordKey, rowIndex: rec.rowIndex,
                        studentPic: studentPic, housePic: housePic 
                    });
                }
            }

            document.getElementById('loader').style.display = 'none';
            updateStats(); buildFilterOptions(); generatePlan(); startBackgroundGeocoding();
        }

        // บันทึกสถานะเยี่ยมบ้าน ลง Sheet โดยตรง
        function toggleVisit(studentId, btnElement) {
            let student = allStudents.find(s => String(s.id) === String(studentId));
            if(!student) return;

            const newStatus = !student.isVisited;
            student.isVisited = newStatus;
            
            const originalHtml = btnElement.innerHTML;
            btnElement.innerHTML = `<i class="ph ph-spinner animate-spin"></i> รอเซฟ...`;
            btnElement.disabled = true;

            const revert = () => {
                student.isVisited = !newStatus;
                btnElement.innerHTML = originalHtml;
                btnElement.disabled = false;
                alert("บันทึกไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ต");
            };

            const cbName = 'cb_update_' + Date.now() + Math.floor(Math.random() * 1000);
            const timeoutId = setTimeout(() => {
                delete window[cbName];
                revert();
            }, 10000);

            window[cbName] = function(data) {
                clearTimeout(timeoutId);
                delete window[cbName];
                // เช็คสถานะการเซฟอิงตาม Code.gs ใหม่ (data.success)
                if(data && data.success) {
                    updateStats();
                    refreshUI(); // <--- รีเฟรชแค่ UI โดยไม่จัดเส้นทางใหม่
                    showToast(newStatus ? "บันทึกลง Sheet เรียบร้อย" : "ยกเลิกแล้ว", newStatus);
                } else {
                    revert();
                    alert("เซิร์ฟเวอร์แจ้งเตือน: " + (data.error || 'Unknown Error'));
                }
            };

            const script = document.createElement('script');
            // ส่ง parameter &row=... และ &visited=... ตาม Code.gs ใหม่ของอาจารย์
            script.src = `${API_URL}?action=update&row=${encodeURIComponent(student.rowIndex)}&visited=${newStatus}&callback=${cbName}&t=${Date.now()}`;
            script.onerror = () => {
                clearTimeout(timeoutId);
                revert();
            };
            document.head.appendChild(script);
        }

        async function startBackgroundGeocoding() {
            let needsUpdate = false;
            let statusEl = document.getElementById('geoStatus');
            statusEl.innerText = "(ค้นหาพื้นที่...)";

            for (let i = 0; i < allStudents.length; i++) {
                let s = allStudents[i];
                if (s.address.province === '' && s.lat) {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${s.lat}&lon=${s.lng}&accept-language=th`);
                        const data = await res.json();
                        if(data && data.address) {
                            s.address.subdistrict = (data.address.suburb || data.address.village || '').replace('ตำบล', '').replace('ต.', '').trim();
                            s.address.district = (data.address.county || data.address.city || '').replace('อำเภอ', '').replace('อ.', '').trim();
                            s.address.province = (data.address.state || '').replace('จังหวัด', '').replace('จ.', '').trim();
                            s.address.full = `ต.${s.address.subdistrict} อ.${s.address.district}`;
                            addressCache[s.coordKey] = s.address;
                            needsUpdate = true;
                        }
                    } catch(e) {}
                    await new Promise(r => setTimeout(r, 1100)); // หน่วงเวลา API
                }
            }

            if(needsUpdate) {
                try { localStorage.setItem('addressCacheM52', JSON.stringify(addressCache)); } catch(e){}
                buildFilterOptions(); refreshUI();
            }
            statusEl.innerText = "";
        }

        function updateStats() {
            const total = allStudents.length;
            const visited = allStudents.filter(s => s.isVisited).length;
            document.getElementById('statTotal').innerText = total - visited;
            document.getElementById('statVisited').innerText = visited;
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function generatePlan() {
            mapLayerGroup.clearLayers(); currentPlan = [];
            const coords = document.getElementById('startCoords').value.split(',');
            const startLat = parseFloat(coords[0]); const startLng = parseFloat(coords[1]);
            const perDayLimit = parseInt(document.getElementById('perDayLimit').value) || 5;

            let filteredStudents = allStudents.filter(s => {
                if (selectedDistricts.length === 0 && selectedSubdistricts.length === 0) return true;
                return selectedDistricts.includes(s.address.district) || selectedSubdistricts.includes(s.address.subdistrict);
            });

            let pendingStudents = filteredStudents.filter(s => !s.isVisited);
            let visitedStudents = filteredStudents.filter(s => s.isVisited);
            let currentLoc = { lat: startLat, lng: startLng }, currentDayRoute = [];

            while (pendingStudents.length > 0) {
                let nearestIdx = 0, minDistance = Infinity;
                for (let i = 0; i < pendingStudents.length; i++) {
                    const d = getDistance(currentLoc.lat, currentLoc.lng, pendingStudents[i].lat, pendingStudents[i].lng);
                    if (d < minDistance) { minDistance = d; nearestIdx = i; }
                }
                let nextStudent = pendingStudents.splice(nearestIdx, 1)[0];
                nextStudent.distanceFromPrev = minDistance;
                currentDayRoute.push(nextStudent);
                currentLoc = { lat: nextStudent.lat, lng: nextStudent.lng };

                if (currentDayRoute.length >= perDayLimit || pendingStudents.length === 0) {
                    currentPlan.push(currentDayRoute);
                    currentDayRoute = [];
                    currentLoc = { lat: startLat, lng: startLng }; 
                }
            }

            drawMap(startLat, startLng, visitedStudents);
            renderPlanList(visitedStudents, filteredStudents.length);
        }

        function refreshUI() {
            const coords = document.getElementById('startCoords').value.split(',');
            let filteredStudents = allStudents.filter(s => {
                if (selectedDistricts.length === 0 && selectedSubdistricts.length === 0) return true;
                return selectedDistricts.includes(s.address.district) || selectedSubdistricts.includes(s.address.subdistrict);
            });
            mapLayerGroup.clearLayers();
            drawMap(parseFloat(coords[0]), parseFloat(coords[1]), filteredStudents.filter(s => s.isVisited));
            renderPlanList(filteredStudents.filter(s => s.isVisited), filteredStudents.length);
        }

        function drawMap(startLat, startLng, visitedStudents) {
            let bounds = [[startLat, startLng]];
            L.marker([startLat, startLng], { icon: L.divIcon({ className: 'custom-div-icon', html: `<div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center text-white text-xl shadow-xl border-4 border-white"><i class="ph ph-house-line"></i></div>`, iconSize: [40, 40]}) }).addTo(mapLayerGroup).bindPopup('จุดเริ่มต้น');

            let planStudentIds = new Set();
            currentPlan.forEach(day => day.forEach(s => planStudentIds.add(s.id)));

            visitedStudents.forEach(s => {
                if(planStudentIds.has(s.id)) return; 
                L.marker([s.lat, s.lng], { icon: L.divIcon({ className: 'custom-div-icon', html: `<div class="w-7 h-7 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-md border-2 border-white opacity-80"><i class="ph ph-check font-bold text-xs"></i></div>`, iconSize: [28, 28]}) }).addTo(mapLayerGroup).bindPopup(`<b>${s.fName}</b>`);
                bounds.push([s.lat, s.lng]);
            });

            currentPlan.forEach((dayRoute, dayIndex) => {
                const colorObj = dayColors[dayIndex % dayColors.length];
                let latlngs = [[startLat, startLng]];
                dayRoute.forEach((s, index) => {
                    latlngs.push([s.lat, s.lng]); bounds.push([s.lat, s.lng]);
                    const pinBg = s.isVisited ? 'bg-emerald-500' : colorObj.bg;
                    L.marker([s.lat, s.lng], { icon: L.divIcon({ className: 'custom-div-icon', html: `<div class="w-9 h-9 ${pinBg} rounded-full flex items-center justify-center text-white font-bold shadow-md border-[2px] border-white text-sm">${index + 1}</div>`, iconSize: [36, 36]}) }).addTo(mapLayerGroup).bindPopup(s.fName);
                });
                L.polyline(latlngs, { color: colorObj.hex, weight: 3, opacity: 0.8, dashArray: '5, 5' }).addTo(mapLayerGroup);
            });
            if(bounds.length > 0) map.fitBounds(bounds, { padding: [30, 30], maxZoom: 16 });
        }

        function renderPlanList(visitedStudents, totalFiltered) {
            const container = document.getElementById('planListContainer'); container.innerHTML = '';
            let planStudentIds = new Set();

            currentPlan.forEach((dayRoute, dayIndex) => {
                const colorObj = dayColors[dayIndex % dayColors.length];
                let html = `
                    <div class="border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm mb-4">
                        <div class="bg-slate-50 px-4 py-3 border-b flex justify-between items-center">
                            <h3 class="font-bold text-slate-800 flex items-center gap-2 text-sm"><div class="w-3 h-3 ${colorObj.bg} rounded-full"></div> วันที่ ${dayIndex + 1} <span class="font-normal text-slate-500">(${dayRoute.length} หลัง)</span></h3>
                            <button onclick="startDayNavigation(${dayIndex})" class="bg-slate-800 text-white text-xs font-bold px-3 py-1.5 rounded-lg">นำทางทั้งวัน</button>
                        </div>
                        <div class="divide-y divide-slate-100">
                `;
                dayRoute.forEach((s, index) => {
                    planStudentIds.add(s.id);
                    const btnHtml = s.isVisited 
                        ? `<button onclick="toggleVisit('${s.id}', this)" class="flex-1 bg-orange-50 text-orange-600 border border-orange-200 font-bold py-2 rounded-lg text-xs md:text-sm transition flex justify-center items-center gap-1"><i class="ph ph-arrow-u-up-left"></i> ยกเลิก</button>`
                        : `<button onclick="toggleVisit('${s.id}', this)" class="flex-1 bg-emerald-50 text-emerald-600 border border-emerald-200 font-bold py-2 rounded-lg text-xs md:text-sm transition flex justify-center items-center gap-1"><i class="ph ph-check"></i> ติ๊กเยี่ยม</button>`;
                    
                    // ปุ่มดูรูปภาพ 
                    let photoBtns = '';
                    if (s.studentPic) {
                        photoBtns += `<button onclick="openImageModal('${s.studentPic}', 'รูปนักเรียน: ${s.fName}')" class="mt-2 text-[10px] md:text-xs bg-indigo-50 text-indigo-600 border border-indigo-100 px-2 py-1 rounded-md font-medium flex items-center gap-1 hover:bg-indigo-100 transition"><i class="ph ph-user-portrait"></i> นักเรียน</button>`;
                    }
                    if (s.housePic) {
                        photoBtns += `<button onclick="openImageModal('${s.housePic}', 'รูปบ้าน: ${s.fName}')" class="mt-2 text-[10px] md:text-xs bg-indigo-50 text-indigo-600 border border-indigo-100 px-2 py-1 rounded-md font-medium flex items-center gap-1 hover:bg-indigo-100 transition"><i class="ph ph-house"></i> บ้าน</button>`;
                    }

                    html += `
                        <div class="p-3 md:p-4 ${s.isVisited ? 'bg-emerald-50/40 opacity-80' : ''}">
                            <div class="flex items-start gap-3 mb-3">
                                <div class="w-8 h-8 rounded-full ${s.isVisited ? 'bg-emerald-500' : colorObj.bg} text-white flex items-center justify-center font-bold text-sm shrink-0 mt-1">${index + 1}</div>
                                <div class="flex-1 min-w-0 pr-6">
                                    <p class="font-bold text-slate-800 text-sm md:text-base">${s.fName}</p>
                                    <p class="text-xs text-slate-500 mt-1">${s.address.full}</p>
                                    <div class="flex flex-wrap items-center gap-2 mt-2">
                                        <button onclick="openNearbyModal('${s.id}')" class="mt-2 text-[10px] md:text-xs bg-blue-50 text-blue-600 border border-blue-100 px-2 py-1 rounded-md font-medium flex items-center gap-1 hover:bg-blue-100 transition"><i class="ph ph-magnifying-glass-plus"></i> เพื่อนบ้าน</button>
                                        ${photoBtns}
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-2 ml-11">
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank" class="flex-1 text-center bg-white text-slate-700 font-bold py-2 rounded-lg text-xs md:text-sm border border-slate-300">นำทาง 1 หลัง</a>
                                ${btnHtml}
                            </div>
                        </div>`;
                });
                html += `</div></div>`; container.innerHTML += html;
            });

            let pastVisited = visitedStudents.filter(s => !planStudentIds.has(s.id));
            if (pastVisited.length > 0) {
                let visitedHtml = `<div class="mt-6 border-t pt-4"><h3 class="font-bold text-emerald-600 mb-3 flex items-center gap-2"><i class="ph-fill ph-check-circle text-xl"></i> ประวัติเยี่ยมแล้ว</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-2">`;
                pastVisited.forEach(s => {
                    visitedHtml += `
                        <div class="bg-white border border-emerald-200 p-3 rounded-xl flex justify-between items-center shadow-sm">
                            <div class="truncate pr-2"><p class="font-bold text-sm text-slate-700 truncate">${s.fName}</p></div>
                            <button onclick="toggleVisit('${s.id}', this)" class="bg-orange-50 text-orange-600 border border-orange-200 text-xs px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 shrink-0"><i class="ph ph-arrow-u-up-left"></i> ยกเลิก</button>
                        </div>`;
                });
                visitedHtml += `</div></div>`;
                container.innerHTML += visitedHtml;
            }
        }

        // --- ระบบเปิดดูรูปภาพ (แก้ปัญหาลิงก์ Google Drive) ---
        function getDriveDirectUrl(url) {
            if (!url) return '';
            const match = url.match(/file\/d\/([a-zA-Z0-9_-]+)/);
            if (match && match[1]) return `https://drive.google.com/uc?id=${match[1]}`;
            const idMatch = url.match(/id=([a-zA-Z0-9_-]+)/);
            if (idMatch && idMatch[1]) return `https://drive.google.com/uc?id=${idMatch[1]}`;
            return url;
        }

        function openImageModal(imgUrl, title) {
            const directUrl = getDriveDirectUrl(imgUrl);
            const imgObj = document.getElementById('modalImageObj');
            const imgLink = document.getElementById('modalImageLink');
            
            imgObj.src = directUrl;
            imgObj.dataset.originalUrl = imgUrl;
            imgLink.href = imgUrl; 
            imgLink.classList.add('hidden');
            
            document.getElementById('modalImageTitle').innerText = title;
            
            const modal = document.getElementById('imageModal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('modalImageObj').src = '';
            }, 300);
        }

        // ระบบ Filter พื้นที่
        function buildFilterOptions() {
            const container = document.getElementById('filterOptionsContainer'); container.innerHTML = '';
            let districtMap = {};
            allStudents.forEach(s => {
                const dist = s.address.district || 'รอแปลพิกัด'; const subd = s.address.subdistrict || 'รอพิกัด';
                if(!districtMap[dist]) districtMap[dist] = new Set();
                districtMap[dist].add(subd);
            });

            for (const [dist, subdSet] of Object.entries(districtMap)) {
                let html = `<div class="mb-4 bg-white border border-slate-200 rounded-xl overflow-hidden"><div class="bg-slate-100 px-4 py-2 border-b"><label class="font-bold flex items-center gap-2"><input type="checkbox" class="cb-custom" value="${dist}" onchange="toggleDistrictCb(this)" ${selectedDistricts.includes(dist)?'checked':''}> อ.${dist}</label></div><div class="p-3 grid grid-cols-2 gap-2">`;
                Array.from(subdSet).sort().forEach(subd => {
                    html += `<label class="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" class="cb-custom subd-cb" data-dist="${dist}" value="${subd}" ${selectedSubdistricts.includes(subd)?'checked':''}> ต.${subd}</label>`;
                });
                html += `</div></div>`; container.innerHTML += html;
            }
        }
        function toggleDistrictCb(cb) { document.querySelectorAll(`.subd-cb[data-dist="${cb.value}"]`).forEach(c => c.checked = cb.checked); }
        function openFilterModal() { document.getElementById('filterModal').classList.remove('hidden'); setTimeout(() => document.getElementById('filterModal').classList.remove('opacity-0'), 10); }
        function closeFilterModal() { document.getElementById('filterModal').classList.add('opacity-0'); setTimeout(() => document.getElementById('filterModal').classList.add('hidden'), 300); }
        function clearFilters() { document.querySelectorAll('.cb-custom').forEach(cb => cb.checked = false); applyFilters(); }
        function applyFilters() {
            selectedDistricts = Array.from(document.querySelectorAll('input[onchange="toggleDistrictCb(this)"]:checked')).map(cb => cb.value);
            selectedSubdistricts = Array.from(document.querySelectorAll('.subd-cb:checked')).map(cb => cb.value);
            document.getElementById('filterSummaryText').innerText = (selectedDistricts.length || selectedSubdistricts.length) ? `กรอง ${selectedDistricts.length} อำเภอ` : "ยังไม่ได้เลือกพื้นที่ (แสดงทั้งหมด)";
            closeFilterModal(); generatePlan();
        }

        // ระบบเพื่อนบ้าน
        function openNearbyModal(studentId) {
            const targetStudent = allStudents.find(s => String(s.id) === String(studentId));
            if(!targetStudent || !targetStudent.lat) return;

            document.getElementById('nearbyTargetName').innerText = `${targetStudent.fName}`;
            let neighbors = allStudents.filter(s => s.id !== targetStudent.id && s.lat && s.lng);
            neighbors.forEach(s => { s.tempDist = getDistance(targetStudent.lat, targetStudent.lng, s.lat, s.lng); });
            neighbors.sort((a,b) => a.tempDist - b.tempDist);
            let topNeighbors = neighbors.slice(0, 5);

            const container = document.getElementById('nearbyListContainer'); container.innerHTML = '';
            if(topNeighbors.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-500 my-4">ไม่พบเพื่อนบ้าน</p>';
            } else {
                topNeighbors.forEach((s, i) => {
                    const statusText = s.isVisited ? '<span class="text-emerald-500 font-bold ml-1">(เยี่ยมแล้ว)</span>' : '';
                    container.innerHTML += `
                        <div class="bg-white p-3 rounded-xl border border-slate-200 mb-2 flex items-center gap-3 shadow-sm">
                            <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs shrink-0">${i+1}</div>
                            <div class="min-w-0 flex-1">
                                <p class="font-bold text-sm text-slate-800 truncate">${s.fName} ${statusText}</p>
                                <p class="text-xs text-slate-500 truncate">${s.address.subdistrict}</p>
                            </div>
                            <div class="bg-amber-50 border border-amber-100 text-amber-700 font-bold px-2 py-1 rounded text-xs shrink-0">~${s.tempDist.toFixed(1)} กม.</div>
                        </div>`;
                });
            }
            document.getElementById('nearbyModal').classList.remove('hidden'); setTimeout(() => document.getElementById('nearbyModal').classList.remove('opacity-0'), 10);
        }
        function closeNearbyModal() { document.getElementById('nearbyModal').classList.add('opacity-0'); setTimeout(() => document.getElementById('nearbyModal').classList.add('hidden'), 300); }

        // นำทาง & โหลดพิกัด
        function startDayNavigation(dayIndex) {
            let startCoords = document.getElementById('startCoords').value;
            const route = currentPlan[dayIndex];
            if(!route || route.length === 0) return;
            let url = `https://www.google.com/maps/dir/?api=1&origin=${startCoords || "13.1126,99.9392"}`;
            if(route.length === 1) { url += `&destination=${route[0].lat},${route[0].lng}`; } 
            else {
                url += `&destination=${route[route.length-1].lat},${route[route.length-1].lng}`;
                if(route.length > 1) url += `&waypoints=${route.slice(0, -1).map(s => `${s.lat},${s.lng}`).join('|')}`;
            }
            window.open(url, '_blank');
        }

        function useSchoolCoords() { document.getElementById('startCoords').value = "13.1126, 99.9392"; generatePlan(); }
        function useCurrentCoords() {
            if (navigator.geolocation) {
                document.getElementById('startCoords').value = "กำลังหา...";
                navigator.geolocation.getCurrentPosition(
                    pos => { document.getElementById('startCoords').value = `${pos.coords.latitude}, ${pos.coords.longitude}`; generatePlan(); },
                    err => { alert("ไม่สามารถดึงตำแหน่งปัจจุบันได้"); document.getElementById('startCoords').value = "13.1126, 99.9392"; }
                );
            }
        }

        function showToast(msg, isSuccess = true) {
            const toast = document.getElementById('toast');
            toast.innerHTML = isSuccess ? `<i class="ph-fill ph-check-circle text-emerald-400 text-lg"></i> <span>${msg}</span>` : `<i class="ph-fill ph-arrow-u-up-left text-orange-400 text-lg"></i> <span>${msg}</span>`;
            toast.classList.remove('opacity-0'); setTimeout(() => toast.classList.add('opacity-0'), 2500);
        }

        window.onload = () => { loadStoredData(); initMap(); fetchDirectFromSheet(); };
    </script>
