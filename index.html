<script>
// ============================================================
// CONFIG
// ============================================================
const GAS_URL = 'const GAS_URL = 'https://script.google.com/macros/s/AKfycbxKk-c6eQKyxM25xjgEXIonoNyKiBsDPdhccKqOY3gLeOb1Y8NfhigIgYZs_UOIprYS/exec';'; // ใส่ URL หลัง Deploy ใน GAS

const SCHOOL = { lat: 13.1126, lng: 99.9392, name: 'โรงเรียน' }; // เปลี่ยนพิกัดโรงเรียนที่นี่

const DAY_COLORS = ['#e74c3c','#2ecc71','#3498db','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];
const DAY_LABELS = ['วันที่ 1','วันที่ 2','วันที่ 3','วันที่ 4','วันที่ 5','วันที่ 6','วันที่ 7','วันที่ 8'];

// ============================================================
// STATE
// ============================================================
let allStudents = [];
let filteredStudents = [];
let routePlan = []; // [[student,...], [student,...]] per day
let startPoint = null;
let startMode = 'school';
let map = null;
let mapMarkers = [];
let selectedAreas = new Set(); // Set of "อำเภอ|ตำบล"
let geocodeCache = {};
let geocodeQueue = [];
let geocodeRunning = false;
let visitedSectionOpen = false;

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  initMap();
  loadGeoCache();
  setStartPoint('school');
  loadData(false);
});

// ============================================================
// MAP INIT
// ============================================================
function initMap() {
  map = L.map('map').setView([SCHOOL.lat, SCHOOL.lng], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);
}

function clearMarkers() {
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];
}

function createColorMarker(color, label) {
  return L.divIcon({
    className: '',
    html: `<div style="background:${color};width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;">
      <span style="transform:rotate(45deg);color:white;font-size:10px;font-weight:700;">${label}</span>
    </div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28],
    popupAnchor: [0, -28]
  });
}

// ============================================================
// DATA LOADING (JSONP)
// ============================================================
function loadData(forceRefresh) {
  document.getElementById('loading-state').classList.remove('hidden');
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('plans-container').innerHTML = '';

  const cb = 'cb_' + Date.now();
  const url = `${GAS_URL}?action=read&callback=${cb}&_=${Date.now()}`;

  window[cb] = function(data) {
    delete window[cb];
    document.getElementById('loading-state').classList.add('hidden');
    if (data.success) {
      allStudents = data.data;
      filteredStudents = [...allStudents];
      updateHeaderSummary();
      renderVisitedSection();
      document.getElementById('empty-state').classList.remove('hidden');
      startGeocodeQueue();
    } else {
      showToast('โหลดข้อมูลไม่สำเร็จ: ' + data.error, 'error');
    }
  };

  const script = document.createElement('script');
  script.src = url;
  script.onerror = () => {
    delete window[cb];
    document.getElementById('loading-state').classList.add('hidden');
    showToast('ไม่สามารถเชื่อมต่อ API ได้', 'error');
  };
  document.head.appendChild(script);
  setTimeout(() => { if (window[cb]) { delete window[cb]; showToast('หมดเวลาเชื่อมต่อ', 'error'); } }, 15000);
}

// ============================================================
// START POINT
// ============================================================
function setStartPoint(mode) {
  startMode = mode;
  document.getElementById('btn-school').className = mode === 'school'
    ? 'start-btn flex items-center gap-2 justify-center py-2.5 px-3 rounded-xl border-2 border-brand-500 bg-brand-50 text-brand-700 text-sm font-semibold transition'
    : 'start-btn flex items-center gap-2 justify-center py-2.5 px-3 rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-600 text-sm font-medium transition hover:border-brand-400';
  document.getElementById('btn-gps').className = mode === 'gps'
    ? 'start-btn flex items-center gap-2 justify-center py-2.5 px-3 rounded-xl border-2 border-brand-500 bg-brand-50 text-brand-700 text-sm font-semibold transition'
    : 'start-btn flex items-center gap-2 justify-center py-2.5 px-3 rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-600 text-sm font-medium transition hover:border-brand-400';

  if (mode === 'school') {
    startPoint = { lat: SCHOOL.lat, lng: SCHOOL.lng };
  } else {
    if (!navigator.geolocation) { showToast('เบราว์เซอร์ไม่รองรับ GPS', 'error'); return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        startPoint = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        showToast('ได้รับพิกัดปัจจุบันแล้ว ✓', 'success');
      },
      err => { showToast('ไม่สามารถรับ GPS ได้: ' + err.message, 'error'); startMode = 'school'; setStartPoint('school'); }
    );
  }
}

// ============================================================
// HAVERSINE DISTANCE
// ============================================================
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ============================================================
// NEAREST NEIGHBOR ROUTING
// ============================================================
function nearestNeighborRoute(candidates, start) {
  let remaining = [...candidates];
  let route = [];
  let cur = start;

  while (remaining.length > 0) {
    let minDist = Infinity, minIdx = 0;
    remaining.forEach((s, i) => {
      const d = haversine(cur.lat, cur.lng, s.lat, s.lng);
      if (d < minDist) { minDist = d; minIdx = i; }
    });
    route.push(remaining[minIdx]);
    cur = remaining[minIdx];
    remaining.splice(minIdx, 1);
  }
  return route;
}

// ============================================================
// BUILD ROUTE
// ============================================================
function buildRoute() {
  if (!startPoint) { showToast('กรุณาเลือกจุดเริ่มต้นก่อน', 'error'); return; }

  const homesPerDay = parseInt(document.getElementById('homes-per-day').value) || 5;
  const candidates = filteredStudents.filter(s => !s.visited);

  if (candidates.length === 0) { showToast('ไม่มีนักเรียนที่ยังไม่ได้เยี่ยม', 'error'); return; }

  document.getElementById('empty-state').classList.add('hidden');

  const ordered = nearestNeighborRoute(candidates, startPoint);

  routePlan = [];
  for (let i = 0; i < ordered.length; i += homesPerDay) {
    routePlan.push(ordered.slice(i, i + homesPerDay));
  }

  renderMap();
  renderDailyPlans();
  renderGmapsLink(0);
  renderLegend();
}

// ============================================================
// RENDER MAP
// ============================================================
function renderMap() {
  clearMarkers();

  // Start marker
  const startIcon = L.divIcon({
    className: '',
    html: `<div style="background:#1a73e8;width:32px;height:32px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
    </div>`,
    iconSize: [32, 32], iconAnchor: [16, 16]
  });
  const startMarker = L.marker([startPoint.lat, startPoint.lng], { icon: startIcon }).addTo(map);
  startMarker.bindPopup('<b>จุดเริ่มต้น</b>');
  mapMarkers.push(startMarker);

  const bounds = [[startPoint.lat, startPoint.lng]];

  routePlan.forEach((dayStudents, dayIdx) => {
    const color = DAY_COLORS[dayIdx % DAY_COLORS.length];
    dayStudents.forEach((s, i) => {
      const icon = createColorMarker(s.visited ? '#22c55e' : color, s.visited ? '✓' : (i + 1).toString());
      const marker = L.marker([s.lat, s.lng], { icon }).addTo(map);
      marker.bindPopup(`
        <div style="font-family:Sarabun,sans-serif;min-width:160px">
          <b>${s.name}</b><br>
          <span style="color:#666;font-size:12px">${DAY_LABELS[dayIdx] || 'วันที่ ' + (dayIdx+1)}</span><br>
          ${s.phone ? `<a href="tel:${s.phone}" style="color:#1a73e8">${s.phone}</a>` : ''}
          <br><span style="color:${s.visited?'#16a34a':'#888'};font-size:12px">${s.visited ? '✓ เยี่ยมแล้ว' : 'ยังไม่ได้เยี่ยม'}</span>
        </div>
      `);
      s._marker = marker;
      mapMarkers.push(marker);
      bounds.push([s.lat, s.lng]);
    });
  });

  // Draw route lines
  routePlan.forEach((dayStudents, dayIdx) => {
    const color = DAY_COLORS[dayIdx % DAY_COLORS.length];
    const points = [[startPoint.lat, startPoint.lng], ...dayStudents.map(s => [s.lat, s.lng])];
    const poly = L.polyline(points, { color, weight: 2, opacity: 0.5, dashArray: '6,4' }).addTo(map);
    mapMarkers.push(poly);
  });

  if (bounds.length > 1) map.fitBounds(bounds, { padding: [30, 30] });
}

// ============================================================
// RENDER LEGEND
// ============================================================
function renderLegend() {
  const el = document.getElementById('map-legend');
  el.innerHTML = '';
  routePlan.forEach((_, i) => {
    const div = document.createElement('div');
    div.className = 'flex items-center gap-1';
    div.innerHTML = `<span style="background:${DAY_COLORS[i%DAY_COLORS.length]};width:12px;height:12px;border-radius:2px;display:inline-block;flex-shrink:0"></span>${DAY_LABELS[i] || 'วันที่'+(i+1)} (${routePlan[i].length} บ้าน)`;
    el.appendChild(div);
  });
  el.classList.remove('hidden');
}

// ============================================================
// RENDER DAILY PLAN CARDS
// ============================================================
function renderDailyPlans() {
  const container = document.getElementById('plans-container');
  container.innerHTML = '';

  routePlan.forEach((dayStudents, dayIdx) => {
    const color = DAY_COLORS[dayIdx % DAY_COLORS.length];
    const section = document.createElement('div');
    section.className = 'bg-white rounded-2xl shadow-sm overflow-hidden fade-in';
    section.id = `day-section-${dayIdx}`;

    const unvisited = dayStudents.filter(s => !s.visited).length;

    section.innerHTML = `
      <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100" style="border-left:4px solid ${color}">
        <div class="flex items-center gap-2">
          <span class="day-badge" style="background:${color}">${dayIdx+1}</span>
          <span class="font-semibold text-slate-700 text-sm">${DAY_LABELS[dayIdx] || 'วันที่'+(dayIdx+1)}</span>
          <span class="text-xs text-slate-400">${dayStudents.length} บ้าน • เหลือ ${unvisited}</span>
        </div>
        <button onclick="renderGmapsLink(${dayIdx}); scrollToGmaps();" class="text-xs bg-green-100 text-green-700 hover:bg-green-200 rounded-lg px-2 py-1 transition">🗺 นำทาง</button>
      </div>
      <div class="p-3 space-y-2" id="day-list-${dayIdx}">
        ${dayStudents.map((s, i) => renderStudentCard(s, dayIdx, i)).join('')}
      </div>
    `;
    container.appendChild(section);
  });
}

function renderStudentCard(s, dayIdx, posIdx) {
  const color = DAY_COLORS[dayIdx % DAY_COLORS.length];
  const cardBase = s.visited ? 'card-visited' : 'bg-slate-50';
  const dist = startPoint ? haversine(startPoint.lat, startPoint.lng, s.lat, s.lng).toFixed(1) : '?';

  return `
    <div class="rounded-xl border border-slate-200 p-3 ${cardBase} transition" id="card-${s.rowIndex}" data-row="${s.rowIndex}">
      <div class="flex items-start gap-3">
        <div class="day-badge mt-0.5" style="background:${s.visited ? '#22c55e' : color}">${s.visited ? '✓' : posIdx+1}</div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-slate-800 text-sm truncate">${s.name}</div>
          <div class="flex flex-wrap gap-x-3 gap-y-0.5 mt-0.5 text-xs text-slate-500">
            ${s.phone ? `<a href="tel:${s.phone}" class="text-brand-600 hover:underline flex items-center gap-1"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"/></svg>${s.phone}</a>` : ''}
            <span>📍 ${dist} กม.</span>
            ${s._subdistrict ? `<span class="text-slate-400">ต.${s._subdistrict} อ.${s._district}</span>` : ''}
          </div>
        </div>
        <div class="flex flex-col gap-1 shrink-0">
          <button onclick="toggleVisit(${s.rowIndex})" id="btn-visit-${s.rowIndex}"
            class="${s.visited ? 'bg-red-100 text-red-600 hover:bg-red-200' : 'bg-brand-100 text-brand-700 hover:bg-brand-200'} text-xs px-2 py-1 rounded-lg transition font-medium">
            ${s.visited ? 'ยกเลิก' : 'ติ๊กเยี่ยม'}
          </button>
          <button onclick="showNeighbors(${s.rowIndex})" class="bg-slate-100 text-slate-600 hover:bg-slate-200 text-xs px-2 py-1 rounded-lg transition">
            หาเพื่อนบ้าน
          </button>
          <button onclick="flyToStudent(${s.lat}, ${s.lng})" class="bg-slate-100 text-slate-600 hover:bg-slate-200 text-xs px-2 py-1 rounded-lg transition">
            📍 แผนที่
          </button>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// TOGGLE VISIT (no reroute!)
// ============================================================
async function toggleVisit(rowIndex) {
  const student = allStudents.find(s => s.rowIndex === rowIndex);
  if (!student) return;

  const newVisited = !student.visited;
  const btn = document.getElementById(`btn-visit-${rowIndex}`);
  const card = document.getElementById(`card-${rowIndex}`);

  // Optimistic UI update — no rerouteing
  student.visited = newVisited;
  if (btn) {
    btn.textContent = newVisited ? 'ยกเลิก' : 'ติ๊กเยี่ยม';
    btn.className = newVisited
      ? 'bg-red-100 text-red-600 hover:bg-red-200 text-xs px-2 py-1 rounded-lg transition font-medium'
      : 'bg-brand-100 text-brand-700 hover:bg-brand-200 text-xs px-2 py-1 rounded-lg transition font-medium';
  }
  if (card) {
    if (newVisited) card.classList.add('card-visited');
    else card.classList.remove('card-visited');
  }

  // Update badge on day section
  updateDaySectionBadge(rowIndex);
  updateMarkerColor(student, newVisited);
  renderVisitedSection();
  updateHeaderSummary();

  // Fire API
  apiUpdate(rowIndex, newVisited);
}

function updateDaySectionBadge(rowIndex) {
  routePlan.forEach((dayStudents, dayIdx) => {
    if (dayStudents.find(s => s.rowIndex === rowIndex)) {
      const unvisited = dayStudents.filter(s => !s.visited).length;
      const header = document.querySelector(`#day-section-${dayIdx} .text-slate-400`);
      if (header) header.textContent = `${dayStudents.length} บ้าน • เหลือ ${unvisited}`;
    }
  });
}

function updateMarkerColor(student, visited) {
  if (!student._marker) return;
  const dayIdx = routePlan.findIndex(d => d.find(s => s.rowIndex === student.rowIndex));
  const posIdx = dayIdx >= 0 ? routePlan[dayIdx].indexOf(student) : 0;
  const color = visited ? '#22c55e' : DAY_COLORS[dayIdx % DAY_COLORS.length];
  const label = visited ? '✓' : (posIdx + 1).toString();
  student._marker.setIcon(createColorMarker(color, label));
}

// ============================================================
// API UPDATE
// ============================================================
function apiUpdate(rowIndex, visited) {
  const cb = 'cb_upd_' + Date.now();
  const url = `${GAS_URL}?action=update&row=${rowIndex}&visited=${visited}&callback=${cb}&_=${Date.now()}`;
  window[cb] = function(data) { delete window[cb]; if (!data.success) showToast('บันทึกไม่สำเร็จ: ' + data.error, 'error'); };
  const script = document.createElement('script');
  script.src = url;
  script.onerror = () => { delete window[cb]; showToast('เชื่อมต่อไม่สำเร็จ', 'error'); };
  document.head.appendChild(script);
}

// ============================================================
// VISITED SECTION
// ============================================================
function renderVisitedSection() {
  const visited = allStudents.filter(s => s.visited);
  const sec = document.getElementById('visited-section');
  const body = document.getElementById('visited-body');
  const badge = document.getElementById('visited-count-badge');

  badge.textContent = visited.length;
  if (visited.length === 0) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');

  body.innerHTML = visited.map(s => `
    <div class="rounded-xl border border-green-200 bg-green-50 p-3 flex items-center gap-3">
      <div class="w-6 h-6 rounded-full bg-green-400 flex items-center justify-center flex-shrink-0">
        <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-medium text-slate-800 text-sm truncate">${s.name}</div>
        ${s.phone ? `<div class="text-xs text-slate-400">${s.phone}</div>` : ''}
      </div>
      <button onclick="toggleVisit(${s.rowIndex})" class="text-xs text-red-400 hover:text-red-600 transition">ยกเลิก</button>
    </div>
  `).join('');
}

function toggleVisitedSection() {
  visitedSectionOpen = !visitedSectionOpen;
  const body = document.getElementById('visited-body');
  const chevron = document.getElementById('visited-chevron');
  body.classList.toggle('hidden', !visitedSectionOpen);
  chevron.style.transform = visitedSectionOpen ? 'rotate(180deg)' : '';
}

// ============================================================
// GOOGLE MAPS LINK (multi-stop)
// ============================================================
function renderGmapsLink(dayIdx) {
  const section = document.getElementById('gmaps-section');
  const link = document.getElementById('gmaps-link');
  const dayStudents = routePlan[dayIdx];
  if (!dayStudents || dayStudents.length === 0) return;

  const unvisited = dayStudents.filter(s => !s.visited);
  const toVisit = unvisited.length > 0 ? unvisited : dayStudents;

  const origin = `${startPoint.lat},${startPoint.lng}`;
  const destination = `${toVisit[toVisit.length-1].lat},${toVisit[toVisit.length-1].lng}`;
  const waypoints = toVisit.slice(0,-1).map(s => `${s.lat},${s.lng}`).join('|');

  let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
  if (waypoints) url += `&waypoints=${encodeURIComponent(waypoints)}`;

  link.href = url;
  link.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg> เปิดนำทาง ${DAY_LABELS[dayIdx] || 'วันที่'+(dayIdx+1)} ใน Google Maps (${toVisit.length} จุด)`;
  section.classList.remove('hidden');
}

function scrollToGmaps() {
  document.getElementById('gmaps-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ============================================================
// FIND NEIGHBORS
// ============================================================
function showNeighbors(rowIndex) {
  const student = allStudents.find(s => s.rowIndex === rowIndex);
  if (!student) return;

  const others = allStudents.filter(s => s.rowIndex !== rowIndex);
  const ranked = others
    .map(s => ({ ...s, dist: haversine(student.lat, student.lng, s.lat, s.lng) }))
    .sort((a, b) => a.dist - b.dist)
    .slice(0, 5);

  document.getElementById('neighbor-title').textContent = `เพื่อนบ้านของ ${student.name}`;
  document.getElementById('neighbor-list').innerHTML = ranked.map((s, i) => `
    <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-50 transition">
      <div class="w-6 h-6 rounded-full bg-brand-100 text-brand-700 flex items-center justify-center text-xs font-bold flex-shrink-0">${i+1}</div>
      <div class="flex-1 min-w-0">
        <div class="font-medium text-slate-800 text-sm truncate">${s.name}</div>
        <div class="text-xs text-slate-400">${s.dist < 1 ? (s.dist*1000).toFixed(0)+' ม.' : s.dist.toFixed(2)+' กม.'}</div>
      </div>
      <div class="text-right">
        ${s.visited ? '<span class="text-xs bg-green-100 text-green-700 rounded-full px-2 py-0.5">เยี่ยมแล้ว</span>' : ''}
        ${s.phone ? `<a href="tel:${s.phone}" class="text-brand-600 text-xs hover:underline block mt-0.5">${s.phone}</a>` : ''}
      </div>
    </div>
  `).join('');

  document.getElementById('neighbor-modal').classList.remove('hidden');
}

function closeNeighborModal() {
  document.getElementById('neighbor-modal').classList.add('hidden');
}

// ============================================================
// FLY TO STUDENT
// ============================================================
function flyToStudent(lat, lng) {
  map.flyTo([lat, lng], 15, { animate: true, duration: 1 });
  window.scrollTo({ top: document.getElementById('map').offsetTop - 80, behavior: 'smooth' });
}

// ============================================================
// REVERSE GEOCODING (Nominatim)
// ============================================================
function loadGeoCache() {
  try {
    const stored = localStorage.getItem('geocache_v2');
    if (stored) geocodeCache = JSON.parse(stored);
  } catch(e) {}
}

function saveGeoCache() {
  try { localStorage.setItem('geocache_v2', JSON.stringify(geocodeCache)); } catch(e) {}
}

function startGeocodeQueue() {
  const needGeo = allStudents.filter(s => {
    const key = `${s.lat.toFixed(4)},${s.lng.toFixed(4)}`;
    if (geocodeCache[key]) {
      s._district = geocodeCache[key].district;
      s._subdistrict = geocodeCache[key].subdistrict;
      return false;
    }
    return true;
  });

  if (needGeo.length === 0) { buildAreaIndex(); return; }

  geocodeQueue = needGeo;
  document.getElementById('geocode-status').classList.remove('hidden');
  processGeocodeQueue();
}

function processGeocodeQueue() {
  if (geocodeQueue.length === 0) {
    document.getElementById('geocode-status').classList.add('hidden');
    buildAreaIndex();
    saveGeoCache();
    return;
  }

  const s = geocodeQueue.shift();
  const key = `${s.lat.toFixed(4)},${s.lng.toFixed(4)}`;
  const total = allStudents.filter(st => {
    const k = `${st.lat.toFixed(4)},${st.lng.toFixed(4)}`;
    return !geocodeCache[k];
  }).length;
  document.getElementById('geocode-text').textContent = `กำลังแปลงพิกัด... (เหลือ ${geocodeQueue.length} รายการ)`;

  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${s.lat}&lon=${s.lng}&accept-language=th`)
    .then(r => r.json())
    .then(data => {
      const addr = data.address || {};
      const district = addr.city_district || addr.county || addr.suburb || addr.state_district || '';
      const subdistrict = addr.suburb || addr.village || addr.town || '';
      geocodeCache[key] = { district, subdistrict };
      s._district = district;
      s._subdistrict = subdistrict;
    })
    .catch(() => {})
    .finally(() => setTimeout(processGeocodeQueue, 600)); // 600ms delay
}

function buildAreaIndex() {
  // no-op here; areas are available when modal opens
}

// ============================================================
// AREA FILTER MODAL
// ============================================================
function openAreaModal() {
  document.getElementById('area-modal').classList.remove('hidden');

  // Build district/subdistrict tree
  const tree = {};
  allStudents.forEach(s => {
    const d = s._district || 'ไม่ระบุ';
    const sd = s._subdistrict || 'ไม่ระบุ';
    if (!tree[d]) tree[d] = new Set();
    tree[d].add(sd);
  });

  const content = document.getElementById('area-modal-content');
  if (Object.keys(tree).length === 0) {
    content.innerHTML = '<p class="text-sm text-slate-400">ยังไม่ได้แปลงพิกัดเป็นที่อยู่ กรุณารอสักครู่...</p>';
    return;
  }

  content.innerHTML = Object.keys(tree).sort().map(district => {
    const subs = [...tree[district]].sort();
    return `
      <div class="mb-4">
        <div class="font-semibold text-slate-700 text-sm mb-2 flex items-center gap-2">
          <input type="checkbox" class="district-cb rounded" data-district="${district}" onchange="toggleDistrict('${district}', this.checked)" />
          อ.${district}
        </div>
        <div class="pl-4 space-y-1.5">
          ${subs.map(sub => {
            const key = `${district}|${sub}`;
            return `
              <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                <input type="checkbox" class="sub-cb rounded" data-key="${key}" ${selectedAreas.size === 0 || selectedAreas.has(key) ? 'checked' : ''} onchange="onSubChange()" />
                ต.${sub}
              </label>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleDistrict(district, checked) {
  document.querySelectorAll(`[data-key^="${district}|"]`).forEach(cb => { cb.checked = checked; });
}

function onSubChange() {
  // update district checkbox state
  document.querySelectorAll('.district-cb').forEach(dcb => {
    const d = dcb.dataset.district;
    const subs = document.querySelectorAll(`[data-key^="${d}|"]`);
    const allChecked = [...subs].every(c => c.checked);
    dcb.checked = allChecked;
    dcb.indeterminate = !allChecked && [...subs].some(c => c.checked);
  });
}

function selectAllAreas() {
  document.querySelectorAll('.sub-cb, .district-cb').forEach(cb => { cb.checked = true; cb.indeterminate = false; });
}

function clearAllAreas() {
  document.querySelectorAll('.sub-cb, .district-cb').forEach(cb => { cb.checked = false; cb.indeterminate = false; });
}

function applyAreaFilter() {
  const checked = document.querySelectorAll('.sub-cb:checked');
  selectedAreas = new Set([...checked].map(c => c.dataset.key));

  if (selectedAreas.size === 0 || selectedAreas.size === document.querySelectorAll('.sub-cb').length) {
    filteredStudents = [...allStudents];
    document.getElementById('filter-label').textContent = 'ทั้งหมด';
  } else {
    filteredStudents = allStudents.filter(s => {
      const d = s._district || 'ไม่ระบุ';
      const sd = s._subdistrict || 'ไม่ระบุ';
      return selectedAreas.has(`${d}|${sd}`);
    });
    document.getElementById('filter-label').textContent = `${selectedAreas.size} พื้นที่`;
  }

  closeAreaModal();
  showToast(`กรองแล้ว: ${filteredStudents.filter(s=>!s.visited).length} คนที่ยังไม่ได้เยี่ยม`, 'info');
}

function closeAreaModal() {
  document.getElementById('area-modal').classList.add('hidden');
}

// ============================================================
// HEADER SUMMARY
// ============================================================
function updateHeaderSummary() {
  const total = allStudents.length;
  const visited = allStudents.filter(s => s.visited).length;
  const remaining = total - visited;
  document.getElementById('header-summary').textContent = `ทั้งหมด ${total} คน • เยี่ยมแล้ว ${visited} • คงเหลือ ${remaining}`;
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = 'info') {
  const colors = { info: 'bg-brand-600', success: 'bg-green-600', error: 'bg-red-500' };
  const toast = document.createElement('div');
  toast.className = `fixed bottom-4 left-1/2 -translate-x-1/2 z-[100] ${colors[type]} text-white text-sm font-medium px-5 py-2.5 rounded-full shadow-lg fade-in max-w-xs text-center`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Close modals on overlay click
document.getElementById('area-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAreaModal(); });
document.getElementById('neighbor-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeNeighborModal(); });
</script>
